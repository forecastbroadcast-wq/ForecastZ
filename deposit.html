<!DOCTYPE html>
<html>
<head>
    <title>Deposit</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            max-width: 500px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
        }
        .info {
            margin: 20px 0;
            background: #e9f7ef;
            padding: 15px;
            border-left: 5px solid #2ecc71;
        }
        .info p {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        textarea {
            height: 120px;
            resize: none;
        }
        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background: #27ae60;
        }
        .copy-btn {
            background: #3498db;
            margin-left: 10px;
            padding: 5px 10px;
            font-size: 12px;
        }
        .copy-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Make a Deposit</h2>

        <div class="info">
            <p>
                <span><strong>Binance USDT TRC20:</strong> TXE7pSaBucNHgVasiUfBbkiCbNVU3Y2kTi</span>
                <button class="copy-btn" onclick="copyToClipboard('TXE7pSaBucNHgVasiUfBbkiCbNVU3Y2kTi')">Copy</button>
            </p>
            <p>
                <span><strong>Kenyan Paybill:</strong> 247247</span>
                <button class="copy-btn" onclick="copyToClipboard('247247')">Copy</button>
            </p>
            <p>
                <span><strong>Account Number:</strong> 1090186882069</span>
                <button class="copy-btn" onclick="copyToClipboard('1090186882069')">Copy</button>
            </p>
        </div>

        <label for="amount">Deposit Amount (USDT / KES):</label>
        <input type="number" id="amount" placeholder="Enter amount" />

        <label for="proof">Paste Payment Proof:</label>
        <textarea id="proof" placeholder="Paste transaction message here..."></textarea>

        <button onclick="submitDeposit()">Submit</button>
    </div>

    <script>
        // Copy button function
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied: ' + text);
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        }

        // Get email: localStorage first, fallback to URL
        function getUserEmail() {
            return localStorage.getItem('userEmail') || new URLSearchParams(window.location.search).get('email');
        }

        function submitDeposit() {
            const proof = document.getElementById('proof').value.trim();
            const amount = document.getElementById('amount').value.trim();
            const email = getUserEmail(); // get email from localStorage first

            if (!amount || isNaN(amount) || Number(amount) <= 0) {
                alert('Please enter a valid deposit amount.');
                return;
            }

            if (!proof) {
                alert('Please paste your payment proof.');
                return;
            }

            if (!email) {
                alert('User email not found. Please log in first.');
                window.location.href = 'login.html';
                return;
            }

            // Save email to localStorage in case it came from query string
            localStorage.setItem('userEmail', email);

            fetch('https://script.google.com/macros/s/AKfycbxR3MZuufZowRWzxTchwqSiYkEapwshnh62t1fWWLISWxTswTUjU4voDyz-Dnniju8jQQ/exec', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, proof: proof, amount: amount })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Save new balance to localStorage for dashboard
                    localStorage.setItem('userBalance', data.newBalance);
                    alert('Deposit submitted! Your new balance: ' + data.newBalance + ' USDT');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Error: ' + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Server error. Try again later.');
            });
        }
    </script>
</body>
</html>
