<!DOCTYPE html>
<html>
<head>
<title>Login - PredictHub</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.login-container{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
text-align:left;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
border-color:#2a5298;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2a5298;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e3c72;
}

#msg{
margin-top:15px;
color:red;
font-size:14px;
}

.signup-link{
margin-top:15px;
font-size:14px;
}

.signup-link a{
color:#2a5298;
text-decoration:none;
font-weight:bold;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">PredictHub</div>

<h2>Login to your account</h2>

<form id="loginForm">

<div class="input-group">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<p id="msg"></p>

<div class="signup-link">
Don't have an account? <a href="signup.html">Sign Up</a>
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwsfP0UxHX2A-5baysnfi_lr4r89ZXFFoXJDCYWNOB82i5XEg74Ig7dRL9Mi04D0Xyw/exec"

document.getElementById("loginForm").addEventListener("submit", e => {

e.preventDefault()

fetch(scriptURL, {

method:"POST",

body:new URLSearchParams({

action:"login",

email:document.getElementById("email").value,

password:document.getElementById("password").value

})

})

.then(res=>res.text())

.then(data=>{

if(data=="login_success"){

window.location.href="dashboard.html"

}

else{

document.getElementById("msg").innerText="You have no account. Sign up."

}

})

})

</script>

</body>
</html>
